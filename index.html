<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omeka Evaluator V2</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app">
    <header>
      <h1>Omeka Evaluator</h1>
    </header>

    <section class="config card">
      <input id="apiUrl" placeholder="URL API Omeka (ex: /api/items)">
      <input id="propertyInput" placeholder="Propriété (ex: dcterms:description)">
      <button id="loadBtn">Charger</button>
    </section>

    <section id="itemSection" class="card hidden">
      <h2 id="title"></h2>
      <p id="property"></p>
    </section>

    <section id="evaluationSection" class="card hidden">
      <input type="range" id="slider" min="0" max="100" value="50">
      <div id="score">50</div>
      <button id="nextBtn">Valider & Suivant</button>
    </section>

    <section class="card">
      <button id="exportBtn">Exporter CSV</button>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
