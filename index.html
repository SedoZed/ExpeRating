<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omeka Annotation Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <header>
    <h1>Annotation Omeka</h1>
    <div id="progress"></div>
  </header>

  <!-- Liste des items -->
  <section id="step2" class="card hidden">
    <h2>Choisir un item</h2>
    <div id="itemList"></div>
  </section>

  <!-- Annotation -->
  <section id="step3" class="card hidden">
    <button id="backBtn">⬅ Retour</button>
    <h3 id="title"></h3>
    <div id="properties"></div>
    <button id="saveBtn">Enregistrer</button>
  </section>

  <section class="card">
    <button id="exportBtn">Exporter JSON</button>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
